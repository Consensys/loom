<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>IOP Round DAG</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#0d1117;
  font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;
  color:#c9d1d9;overflow:hidden}
/* ── toolbar ── */
#bar{
  height:46px;padding:0 16px;
  background:#161b22;border-bottom:1px solid #21262d;
  display:flex;align-items:center;gap:20px;flex-shrink:0}
#bar h1{font-size:.85rem;font-weight:600;letter-spacing:.05em;white-space:nowrap;color:#e6edf3}
#bar h1 span{color:#58a6ff}
#legend{display:flex;gap:16px;align-items:center;font-size:.72rem;color:#8b949e}
.li{display:flex;align-items:center;gap:6px;white-space:nowrap}
#hint{font-size:.68rem;color:#484f58;white-space:nowrap}
#reset{
  margin-left:auto;
  background:#21262d;border:1px solid #30363d;color:#c9d1d9;
  padding:4px 12px;border-radius:5px;cursor:pointer;
  font-size:.72rem;font-family:inherit;white-space:nowrap}
#reset:hover{background:#30363d;border-color:#484f58}
/* ── viewport ── */
#vp{
  position:fixed;top:46px;left:0;right:0;bottom:0;
  overflow:hidden;cursor:grab}
#vp.panning{cursor:grabbing}
svg{width:100%;height:100%}
/* ── node styles ── */
.nc rect{fill:#0d2137;stroke:#388bfd;stroke-width:1.5}
.nc text{fill:#79c0ff}
.nq rect{fill:#1c1333;stroke:#a371f7;stroke-width:1.5}
.nq text{fill:#d2a8ff}
/* ── edge styles ── */
.ec{stroke:#388bfd;stroke-width:1.2;fill:none;stroke-dasharray:5 3}
.eq{stroke:#a371f7;stroke-width:1.5;fill:none}
/* ── tooltip ── */
#tip{
  position:fixed;display:none;
  background:#161b22;border:1px solid #30363d;
  color:#c9d1d9;font-size:.7rem;padding:5px 9px;
  border-radius:4px;pointer-events:none;
  max-width:480px;word-break:break-all;z-index:99}
</style>
</head>
<body>

<div id="bar">
  <h1>&#x25B6;&nbsp;IOP Round <span>DAG</span></h1>
  <div id="legend">
    <div class="li">
      <svg width="13" height="13">
        <rect width="13" height="13" rx="2" fill="#0d2137" stroke="#388bfd" stroke-width="1.5"/>
      </svg>
      Committed column
    </div>
    <div class="li">
      <svg width="13" height="13">
        <rect width="13" height="13" rx="5" fill="#1c1333" stroke="#a371f7" stroke-width="1.5"/>
      </svg>
      Challenge
    </div>
    <div class="li">
      <svg width="30" height="4">
        <line x1="0" y1="2" x2="30" y2="2"
              stroke="#388bfd" stroke-width="1.5" stroke-dasharray="5 3"/>
      </svg>
      from committed
    </div>
    <div class="li">
      <svg width="30" height="4">
        <line x1="0" y1="2" x2="30" y2="2" stroke="#a371f7" stroke-width="1.5"/>
      </svg>
      from challenge
    </div>
  </div>
  <div id="hint">scroll to zoom &middot; drag canvas to pan &middot; drag node to move &middot; hover for full ID</div>
  <button id="reset" onclick="resetLayout()">&#x21BA; Reset layout</button>
</div>

<div id="vp">
  <svg id="svg">
    <defs id="defs"></defs>
    <g id="g"></g>
  </svg>
</div>
<div id="tip"></div>

<script>
const D = {"nodes":[{"id":"0-ID1","label":"0-ID1","kind":"committed","x":105,"y":49},{"id":"0-ID2","label":"0-ID2","kind":"committed","x":105,"y":109},{"id":"0-ID3","label":"0-ID3","kind":"committed","x":105,"y":169},{"id":"0-L","label":"0-L","kind":"committed","x":105,"y":229},{"id":"0-O","label":"0-O","kind":"committed","x":105,"y":289},{"id":"0-QK","label":"0-QK","kind":"committed","x":105,"y":349},{"id":"0-QL","label":"0-QL","kind":"committed","x":105,"y":409},{"id":"0-QM","label":"0-QM","kind":"committed","x":105,"y":469},{"id":"0-QO","label":"0-QO","kind":"committed","x":105,"y":529},{"id":"0-QR","label":"0-QR","kind":"committed","x":105,"y":589},{"id":"0-R","label":"0-R","kind":"committed","x":105,"y":649},{"id":"0-S1","label":"0-S1","kind":"committed","x":105,"y":709},{"id":"0-S2","label":"0-S2","kind":"committed","x":105,"y":769},{"id":"0-S3","label":"0-S3","kind":"committed","x":105,"y":829},{"id":"1-ID1","label":"1-ID1","kind":"committed","x":105,"y":889},{"id":"1-ID2","label":"1-ID2","kind":"committed","x":105,"y":949},{"id":"1-ID3","label":"1-ID3","kind":"committed","x":105,"y":1009},{"id":"1-L","label":"1-L","kind":"committed","x":105,"y":1069},{"id":"1-O","label":"1-O","kind":"committed","x":105,"y":1129},{"id":"1-QK","label":"1-QK","kind":"committed","x":105,"y":1189},{"id":"1-QL","label":"1-QL","kind":"committed","x":105,"y":1249},{"id":"1-QM","label":"1-QM","kind":"committed","x":105,"y":1309},{"id":"1-QO","label":"1-QO","kind":"committed","x":105,"y":1369},{"id":"1-QR","label":"1-QR","kind":"committed","x":105,"y":1429},{"id":"1-R","label":"1-R","kind":"committed","x":105,"y":1489},{"id":"1-S1","label":"1-S1","kind":"committed","x":105,"y":1549},{"id":"1-S2","label":"1-S2","kind":"committed","x":105,"y":1609},{"id":"1-S3","label":"1-S3","kind":"committed","x":105,"y":1669},{"id":"GP_8UImU","label":"GP_8UImU","kind":"committed","x":105,"y":1729},{"id":"GP_exVTp","label":"GP_exVTp","kind":"committed","x":105,"y":1789},{"id":"HFOW2","label":"HFOW2","kind":"challenge","x":645,"y":919},{"id":"github.com/consensys/giop@alpha","label":"alpha","kind":"challenge","x":915,"y":949},{"id":"github.com/consensys/giop@quotient","label":"quotient","kind":"committed","x":105,"y":1849},{"id":"github.com/consensys/giop@zeta","label":"zeta","kind":"challenge","x":1185,"y":949},{"id":"lrlEW","label":"lrlEW","kind":"challenge","x":375,"y":979},{"id":"nlZag","label":"nlZag","kind":"challenge","x":375,"y":919},{"id":"ve1D4","label":"ve1D4","kind":"challenge","x":645,"y":979}],"edges":[{"from":"0-L","to":"nlZag","kind":"committed"},{"from":"0-ID1","to":"nlZag","kind":"committed"},{"from":"0-R","to":"nlZag","kind":"committed"},{"from":"0-ID2","to":"nlZag","kind":"committed"},{"from":"0-O","to":"nlZag","kind":"committed"},{"from":"0-ID3","to":"nlZag","kind":"committed"},{"from":"0-S1","to":"nlZag","kind":"committed"},{"from":"0-S2","to":"nlZag","kind":"committed"},{"from":"0-S3","to":"nlZag","kind":"committed"},{"from":"1-L","to":"lrlEW","kind":"committed"},{"from":"1-ID1","to":"lrlEW","kind":"committed"},{"from":"1-R","to":"lrlEW","kind":"committed"},{"from":"1-ID2","to":"lrlEW","kind":"committed"},{"from":"1-O","to":"lrlEW","kind":"committed"},{"from":"1-ID3","to":"lrlEW","kind":"committed"},{"from":"1-S1","to":"lrlEW","kind":"committed"},{"from":"1-S2","to":"lrlEW","kind":"committed"},{"from":"1-S3","to":"lrlEW","kind":"committed"},{"from":"nlZag","to":"HFOW2","kind":"challenge"},{"from":"lrlEW","to":"ve1D4","kind":"challenge"},{"from":"0-QL","to":"github.com/consensys/giop@alpha","kind":"committed"},{"from":"0-QR","to":"github.com/consensys/giop@alpha","kind":"committed"},{"from":"0-QM","to":"github.com/consensys/giop@alpha","kind":"committed"},{"from":"0-QO","to":"github.com/consensys/giop@alpha","kind":"committed"},{"from":"0-QK","to":"github.com/consensys/giop@alpha","kind":"committed"},{"from":"GP_8UImU","to":"github.com/consensys/giop@alpha","kind":"committed"},{"from":"1-QL","to":"github.com/consensys/giop@alpha","kind":"committed"},{"from":"1-QR","to":"github.com/consensys/giop@alpha","kind":"committed"},{"from":"1-QM","to":"github.com/consensys/giop@alpha","kind":"committed"},{"from":"1-QO","to":"github.com/consensys/giop@alpha","kind":"committed"},{"from":"1-QK","to":"github.com/consensys/giop@alpha","kind":"committed"},{"from":"GP_exVTp","to":"github.com/consensys/giop@alpha","kind":"committed"},{"from":"HFOW2","to":"github.com/consensys/giop@alpha","kind":"challenge"},{"from":"ve1D4","to":"github.com/consensys/giop@alpha","kind":"challenge"},{"from":"github.com/consensys/giop@quotient","to":"github.com/consensys/giop@zeta","kind":"committed"},{"from":"github.com/consensys/giop@alpha","to":"github.com/consensys/giop@zeta","kind":"challenge"}],"nw":170,"nh":38};
const NS = "http://www.w3.org/2000/svg";
const NW = D.nw, NH = D.nh;

// ── mutable positions (graph coords, updated as nodes are dragged) ────────────
const initPos = {}, pos = {};
D.nodes.forEach(n => {
  initPos[n.id] = {x: n.x, y: n.y};
  pos[n.id]     = {x: n.x, y: n.y};
});

// ── viewport transform ────────────────────────────────────────────────────────
let tx = 0, ty = 0, sc = 1;
const g  = document.getElementById("g");
const vp = document.getElementById("vp");
function apply() {
  g.setAttribute("transform", "translate("+tx+","+ty+") scale("+sc+")");
}
// screen → graph coordinate conversion
function toGraph(cx, cy) {
  return {x: (cx - tx) / sc, y: (cy - ty) / sc};
}

// ── arrowhead markers ─────────────────────────────────────────────────────────
const defs = document.getElementById("defs");
function mkMarker(id, col) {
  const m = document.createElementNS(NS, "marker");
  m.setAttribute("id", id);
  m.setAttribute("markerWidth",  "8");
  m.setAttribute("markerHeight", "6");
  m.setAttribute("refX", "8");
  m.setAttribute("refY", "3");
  m.setAttribute("orient", "auto");
  const p = document.createElementNS(NS, "path");
  p.setAttribute("d", "M0,0 L0,6 L8,3 z");
  p.setAttribute("fill", col);
  m.appendChild(p);
  defs.appendChild(m);
}
mkMarker("ac", "#388bfd");
mkMarker("aq", "#a371f7");

// ── edge path string (right-centre of source → left-centre of target) ─────────
function mkEdgePath(sx, sy, ex, ey) {
  const x1 = sx + NW / 2, y1 = sy;
  const x2 = ex - NW / 2, y2 = ey;
  const mx = (x1 + x2) / 2;
  return "M"+x1+","+y1+" C"+mx+","+y1+" "+mx+","+y2+" "+x2+","+y2;
}

// ── draw edges first (store path elements for live update) ────────────────────
const edgePaths = D.edges.map(e => {
  const s = pos[e.from], t = pos[e.to];
  if (!s || !t) return null;
  const path = document.createElementNS(NS, "path");
  path.setAttribute("d", mkEdgePath(s.x, s.y, t.x, t.y));
  path.setAttribute("class", e.kind === "committed" ? "ec" : "eq");
  path.setAttribute("marker-end", "url(#a"+(e.kind === "committed" ? "c" : "q")+")");
  g.appendChild(path);
  return {e, path};
}).filter(Boolean);

// update all edge paths that touch node id
function updateEdges(id) {
  edgePaths.forEach(({e, path}) => {
    if (e.from !== id && e.to !== id) return;
    const s = pos[e.from], t = pos[e.to];
    path.setAttribute("d", mkEdgePath(s.x, s.y, t.x, t.y));
  });
}

// ── draw nodes ────────────────────────────────────────────────────────────────
const tip    = document.getElementById("tip");
const nodeEl = {};               // id → SVG g element
let dragId = null, dragOx = 0, dragOy = 0;

D.nodes.forEach(n => {
  const ng = document.createElementNS(NS, "g");
  ng.setAttribute("class", n.kind === "committed" ? "nc" : "nq");
  ng.setAttribute("transform",
    "translate("+(pos[n.id].x - NW/2)+","+(pos[n.id].y - NH/2)+")");
  ng.style.cursor = "grab";

  const rect = document.createElementNS(NS, "rect");
  rect.setAttribute("width",  NW);
  rect.setAttribute("height", NH);
  rect.setAttribute("rx", n.kind === "committed" ? "3" : "8");

  let lbl = n.label;
  if (lbl.length > 21) lbl = lbl.slice(0, 19) + "\u2026";
  const text = document.createElementNS(NS, "text");
  text.setAttribute("x", NW / 2);
  text.setAttribute("y", NH / 2 + 4);
  text.setAttribute("text-anchor", "middle");
  text.setAttribute("font-size", "11");
  text.setAttribute("font-family",
    'ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace');
  text.textContent = lbl;

  ng.appendChild(rect);
  ng.appendChild(text);

  // tooltip
  ng.addEventListener("mouseenter", ev => {
    tip.textContent = n.id;
    tip.style.display = "block";
    moveTip(ev);
  });
  ng.addEventListener("mousemove", moveTip);
  ng.addEventListener("mouseleave", () => { tip.style.display = "none"; });

  // node drag — stopPropagation prevents viewport pan from activating
  ng.addEventListener("mousedown", ev => {
    ev.stopPropagation();
    dragId = n.id;
    ng.style.cursor = "grabbing";
    const gp = toGraph(ev.clientX, ev.clientY);
    dragOx = gp.x - pos[n.id].x;
    dragOy = gp.y - pos[n.id].y;
  });

  g.appendChild(ng);
  nodeEl[n.id] = ng;
});

function moveTip(ev) {
  tip.style.left = (ev.clientX + 14) + "px";
  tip.style.top  = (ev.clientY -  4) + "px";
}

// move node element and refresh its edges
function renderNode(id) {
  const p = pos[id];
  nodeEl[id].setAttribute("transform",
    "translate("+(p.x - NW/2)+","+(p.y - NH/2)+")");
  updateEdges(id);
}

// reset all nodes to their initial positions
function resetLayout() {
  D.nodes.forEach(n => {
    pos[n.id] = {x: initPos[n.id].x, y: initPos[n.id].y};
    renderNode(n.id);
  });
}

// ── auto-fit on load ──────────────────────────────────────────────────────────
let minX =  Infinity, minY =  Infinity;
let maxX = -Infinity, maxY = -Infinity;
D.nodes.forEach(n => {
  minX = Math.min(minX, n.x - NW / 2); minY = Math.min(minY, n.y - NH / 2);
  maxX = Math.max(maxX, n.x + NW / 2); maxY = Math.max(maxY, n.y + NH / 2);
});
const pad = 40;
minX -= pad; minY -= pad; maxX += pad; maxY += pad;
const cw = vp.clientWidth, ch = vp.clientHeight;
const fw = maxX - minX, fh = maxY - minY;
sc = Math.min(cw / fw, ch / fh, 1.5);
tx = -minX * sc + (cw - fw * sc) / 2;
ty = -minY * sc + (ch - fh * sc) / 2;
apply();

// ── pan (viewport drag) and zoom (wheel) ──────────────────────────────────────
let panning = false, ox = 0, oy = 0;
vp.addEventListener("mousedown", e => {
  panning = true;
  vp.classList.add("panning");
  ox = e.clientX - tx; oy = e.clientY - ty;
});
window.addEventListener("mouseup", () => {
  panning = false;
  vp.classList.remove("panning");
  if (dragId) {
    nodeEl[dragId].style.cursor = "grab";
    dragId = null;
  }
});
window.addEventListener("mousemove", e => {
  if (dragId) {
    const gp = toGraph(e.clientX, e.clientY);
    pos[dragId] = {x: gp.x - dragOx, y: gp.y - dragOy};
    renderNode(dragId);
    return;
  }
  if (panning) {
    tx = e.clientX - ox;
    ty = e.clientY - oy;
    apply();
  }
});
vp.addEventListener("wheel", e => {
  e.preventDefault();
  const f = e.deltaY < 0 ? 1.12 : 0.89;
  const rc = vp.getBoundingClientRect();
  const mx = e.clientX - rc.left;
  const my = e.clientY - rc.top;
  tx = mx - (mx - tx) * f;
  ty = my - (my - ty) * f;
  sc *= f;
  apply();
}, {passive: false});
</script>
</body>
</html>
