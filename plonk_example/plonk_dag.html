<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Prover Actions DAG</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#0d1117;
  font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;
  color:#c9d1d9;overflow:hidden}
/* ── toolbar ── */
#bar{
  height:46px;padding:0 16px;
  background:#161b22;border-bottom:1px solid #21262d;
  display:flex;align-items:center;gap:20px;flex-shrink:0}
#bar h1{font-size:.85rem;font-weight:600;letter-spacing:.05em;white-space:nowrap;color:#e6edf3}
#bar h1 span{color:#e3b341}
#legend{display:flex;gap:16px;align-items:center;font-size:.72rem;color:#8b949e}
.li{display:flex;align-items:center;gap:6px;white-space:nowrap}
#hint{margin-left:auto;font-size:.68rem;color:#484f58;white-space:nowrap}
/* ── viewport ── */
#vp{
  position:fixed;top:46px;left:0;right:0;bottom:0;
  overflow:hidden;cursor:grab}
#vp:active{cursor:grabbing}
svg{width:100%;height:100%}
/* ── node styles ── */
.nk rect{fill:#0d2137;stroke:#388bfd;stroke-width:1.5}   /* known   : blue   */
.nk text{fill:#79c0ff}
.nv rect{fill:#0d2111;stroke:#3fb950;stroke-width:1.5}   /* computed: green  */
.nv text{fill:#7ee787}
.na rect{fill:#2a1a00;stroke:#e3b341;stroke-width:1.5}   /* action  : orange */
.na text{fill:#f0c860}
/* ── edge styles ── */
.eti{stroke:#388bfd;stroke-width:1.2;fill:none;stroke-dasharray:5 3}  /* col→action : dashed blue   */
.efo{stroke:#e3b341;stroke-width:1.5;fill:none}                       /* action→col : solid  orange */
/* ── tooltip ── */
#tip{
  position:fixed;display:none;
  background:#161b22;border:1px solid #30363d;
  color:#c9d1d9;font-size:.7rem;padding:5px 9px;
  border-radius:4px;pointer-events:none;
  max-width:480px;word-break:break-all;z-index:99}
</style>
</head>
<body>

<div id="bar">
  <h1>&#x25B6;&nbsp;Prover Actions <span>DAG</span></h1>
  <div id="legend">
    <div class="li">
      <svg width="13" height="13">
        <rect width="13" height="13" rx="2" fill="#0d2137" stroke="#388bfd" stroke-width="1.5"/>
      </svg>
      Known column
    </div>
    <div class="li">
      <svg width="13" height="13">
        <rect width="13" height="13" rx="2" fill="#0d2111" stroke="#3fb950" stroke-width="1.5"/>
      </svg>
      Computed column
    </div>
    <div class="li">
      <svg width="13" height="13">
        <rect width="13" height="13" rx="5" fill="#2a1a00" stroke="#e3b341" stroke-width="1.5"/>
      </svg>
      Prover action
    </div>
    <div class="li">
      <svg width="30" height="4">
        <line x1="0" y1="2" x2="30" y2="2"
              stroke="#388bfd" stroke-width="1.5" stroke-dasharray="5 3"/>
      </svg>
      input
    </div>
    <div class="li">
      <svg width="30" height="4">
        <line x1="0" y1="2" x2="30" y2="2" stroke="#e3b341" stroke-width="1.5"/>
      </svg>
      output
    </div>
  </div>
  <div id="hint">scroll to zoom &middot; drag to pan &middot; hover for full ID</div>
</div>

<div id="vp">
  <svg id="svg">
    <defs id="defs"></defs>
    <g id="g"></g>
  </svg>
</div>
<div id="tip"></div>

from":"S2","to":"__action_11","kind":"to_action"},{"from":"S3","to":"__action_11","kind":"to_action"},{"from":"__action_11","to":"VWis1e1dqo","kind":"from_action"},{"from":"ID1","to":"__action_12","kind":"to_action"},{"from":"8LY8GEOUG4","to":"__action_12","kind":"to_action"},{"from":"3-L","to":"__action_12","kind":"to_action"},{"from":"VWis1e1dqo","to":"__action_12","kind":"to_action"},{"from":"ID2","to":"__action_12","kind":"to_action"},{"from":"3-R","to":"__action_12","kind":"to_action"},{"from":"ID3","to":"__action_12","kind":"to_action"},{"from":"3-O","to":"__action_12","kind":"to_action"},{"from":"S1","to":"__action_12","kind":"to_action"},{"from":"S2","to":"__action_12","kind":"to_action"},{"from":"S3","to":"__action_12","kind":"to_action"},{"from":"__action_12","to":"GP_tGHIqtAFFk","kind":"from_action"},{"from":"4-L","to":"__action_13","kind":"to_action"},{"from":"ID1","to":"__action_13","kind":"to_action"},{"from":"4-R","to":"__action_13","kind":"to_action"},{"from":"ID2","to":"__action_13","kind":"to_action"},{"from":"4-O","to":"__action_13","kind":"to_action"},{"from":"ID3","to":"__action_13","kind":"to_action"},{"from":"S1","to":"__action_13","kind":"to_action"},{"from":"S2","to":"__action_13","kind":"to_action"},{"from":"S3","to":"__action_13","kind":"to_action"},{"from":"__action_13","to":"rzoPUhazJ1","kind":"from_action"},{"from":"ID1","to":"__action_14","kind":"to_action"},{"from":"rzoPUhazJ1","to":"__action_14","kind":"to_action"},{"from":"4-L","to":"__action_14","kind":"to_action"},{"from":"ID2","to":"__action_14","kind":"to_action"},{"from":"4-R","to":"__action_14","kind":"to_action"},{"from":"ID3","to":"__action_14","kind":"to_action"},{"from":"4-O","to":"__action_14","kind":"to_action"},{"from":"S1","to":"__action_14","kind":"to_action"},{"from":"S2","to":"__action_14","kind":"to_action"},{"from":"S3","to":"__action_14","kind":"to_action"},{"from":"__action_14","to":"6Y9Mlci1LD","kind":"from_action"},{"from":"ID1","to":"__action_15","kind":"to_action"},{"from":"rzoPUhazJ1","to":"__action_15","kind":"to_action"},{"from":"4-L","to":"__action_15","kind":"to_action"},{"from":"6Y9Mlci1LD","to":"__action_15","kind":"to_action"},{"from":"ID2","to":"__action_15","kind":"to_action"},{"from":"4-R","to":"__action_15","kind":"to_action"},{"from":"ID3","to":"__action_15","kind":"to_action"},{"from":"4-O","to":"__action_15","kind":"to_action"},{"from":"S1","to":"__action_15","kind":"to_action"},{"from":"S2","to":"__action_15","kind":"to_action"},{"from":"S3","to":"__action_15","kind":"to_action"},{"from":"__action_15","to":"GP_piZB4nq6FI","kind":"from_action"}],"nw":170,"nh":38};
const NS = "http://www.w3.org/2000/svg";
const NW = D.nw, NH = D.nh;

const byId = {};
D.nodes.forEach(n => { byId[n.id] = n; });

// ── arrowhead markers ─────────────────────────────────────────────────────────
const defs = document.getElementById("defs");
function mkMarker(id, col) {
  const m = document.createElementNS(NS, "marker");
  m.setAttribute("id", id);
  m.setAttribute("markerWidth",  "8");
  m.setAttribute("markerHeight", "6");
  m.setAttribute("refX", "8");
  m.setAttribute("refY", "3");
  m.setAttribute("orient", "auto");
  const p = document.createElementNS(NS, "path");
  p.setAttribute("d", "M0,0 L0,6 L8,3 z");
  p.setAttribute("fill", col);
  m.appendChild(p);
  defs.appendChild(m);
}
mkMarker("ai", "#388bfd"); // input  (blue)
mkMarker("ao", "#e3b341"); // output (orange)

function nodeClass(kind) {
  if (kind === "known")    return "nk";
  if (kind === "computed") return "nv";
  return "na"; // action
}
function edgeClass(kind)   { return kind === "to_action" ? "eti" : "efo"; }
function edgeMarker(kind)  { return kind === "to_action" ? "ai"  : "ao";  }

// ── draw edges first ──────────────────────────────────────────────────────────
const g = document.getElementById("g");
D.edges.forEach(e => {
  const s = byId[e.from], t = byId[e.to];
  if (!s || !t) return;
  const x1 = s.x + NW / 2, y1 = s.y;
  const x2 = t.x - NW / 2, y2 = t.y;
  const mx = (x1 + x2) / 2;
  const path = document.createElementNS(NS, "path");
  path.setAttribute("d",
    "M" + x1 + "," + y1 +
    " C" + mx + "," + y1 +
    " " + mx + "," + y2 +
    " " + x2 + "," + y2);
  path.setAttribute("class",      edgeClass(e.kind));
  path.setAttribute("marker-end", "url(#" + edgeMarker(e.kind) + ")");
  g.appendChild(path);
});

// ── draw nodes ────────────────────────────────────────────────────────────────
const tip = document.getElementById("tip");
D.nodes.forEach(n => {
  const ng = document.createElementNS(NS, "g");
  ng.setAttribute("class", nodeClass(n.kind));
  ng.setAttribute("transform",
    "translate(" + (n.x - NW / 2) + "," + (n.y - NH / 2) + ")");

  const rect = document.createElementNS(NS, "rect");
  rect.setAttribute("width",  NW);
  rect.setAttribute("height", NH);
  rect.setAttribute("rx", n.kind === "action" ? "8" : "3");

  let lbl = n.label;
  if (lbl.length > 21) lbl = lbl.slice(0, 19) + "\u2026";

  const text = document.createElementNS(NS, "text");
  text.setAttribute("x", NW / 2);
  text.setAttribute("y", NH / 2 + 4);
  text.setAttribute("text-anchor", "middle");
  text.setAttribute("font-size", "11");
  text.setAttribute("font-family",
    'ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace');
  text.textContent = lbl;

  ng.appendChild(rect);
  ng.appendChild(text);

  ng.addEventListener("mouseenter", ev => {
    tip.textContent = n.kind === "action" ? n.label : n.id;
    tip.style.display = "block";
    moveTip(ev);
  });
  ng.addEventListener("mousemove", moveTip);
  ng.addEventListener("mouseleave", () => { tip.style.display = "none"; });

  g.appendChild(ng);
});

function moveTip(ev) {
  tip.style.left = (ev.clientX + 14) + "px";
  tip.style.top  = (ev.clientY -  4) + "px";
}

// ── auto-fit ──────────────────────────────────────────────────────────────────
let tx = 0, ty = 0, sc = 1;
function apply() {
  g.setAttribute("transform",
    "translate(" + tx + "," + ty + ") scale(" + sc + ")");
}

let minX =  Infinity, minY =  Infinity;
let maxX = -Infinity, maxY = -Infinity;
D.nodes.forEach(n => {
  minX = Math.min(minX, n.x - NW / 2);
  minY = Math.min(minY, n.y - NH / 2);
  maxX = Math.max(maxX, n.x + NW / 2);
  maxY = Math.max(maxY, n.y + NH / 2);
});
const pad = 40;
minX -= pad; minY -= pad; maxX += pad; maxY += pad;
const vp = document.getElementById("vp");
const cw = vp.clientWidth, ch = vp.clientHeight;
const fw = maxX - minX, fh = maxY - minY;
sc = Math.min(cw / fw, ch / fh, 1.5);
tx = -minX * sc + (cw - fw * sc) / 2;
ty = -minY * sc + (ch - fh * sc) / 2;
apply();

// ── pan and zoom ──────────────────────────────────────────────────────────────
let dragging = false, ox = 0, oy = 0;
vp.addEventListener("mousedown", e => {
  dragging = true; ox = e.clientX - tx; oy = e.clientY - ty;
});
window.addEventListener("mouseup",   () => { dragging = false; });
window.addEventListener("mousemove", e => {
  if (!dragging) return;
  tx = e.clientX - ox;
  ty = e.clientY - oy;
  apply();
});
vp.addEventListener("wheel", e => {
  e.preventDefault();
  const f = e.deltaY < 0 ? 1.12 : 0.89;
  const rc = vp.getBoundingClientRect();
  const mx = e.clientX - rc.left;
  const my = e.clientY - rc.top;
  tx = mx - (mx - tx) * f;
  ty = my - (my - ty) * f;
  sc *= f;
